services:
  ngrok:
    image: ngrok/ngrok:latest
    container_name: zoolflow_ngrok
    restart: always
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command: http web:8000
    ports:
      - "4040:4040"

  web:
    build: .
    container_name: zoolflow_web
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media

  db:
    image: postgres:15
    container_name: zoolflow_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: zoolflow_redis
    restart: always
    ports:
      - "6379:6379"

  celery:
    build: .
    container_name: zoolflow_celery
    command: celery -A config worker -l info -Q celery,expired
    env_file: .env
    depends_on:
      - redis
      - db

  minio:
    image: minio/minio
    container_name: zoolflow_minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web console
    environment:
      MINIO_ROOT_USER: 'minioadmin'
      MINIO_ROOT_PASSWORD: 'minioadmin123'
    volumes:
      - minio_data:/data

volumes:
  db_data:
  static_volume:
  media_volume:
  minio_data:


